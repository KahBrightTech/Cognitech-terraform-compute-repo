#---
# SSM Configuration Workflow Template
# This file contains __PLACEHOLDER__ values that must be replaced when copying to .github/workflows/
# DO NOT use this file directly - it is a template only
# See "Post-Deployment Configuration Variables" section in .github/copilot-instructions.md
#---

name: __CONFIG_WORKFLOW_NAME__

on:
  # Trigger mode: __TRIGGER_MODE__
  # - manual: workflow_dispatch only
  # - automatic: workflow_run only
  # - both: both triggers enabled
  
  # PLACEHOLDER: Replace based on TRIGGER_MODE
  # If manual or both:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'health-check'
        options:
          - health-check
          - configure
          - both

  # If automatic or both:
  workflow_run:
    workflows: ["__DEPLOY_WORKFLOW_NAME__"]
    types:
      - completed
    branches:
      - main

env:
  IAM_ROLE: __IAM_ROLE__
  REGION: __REGION__
  INSTANCE_TAG_PATTERN: __INSTANCE_TAG_PATTERN__
  SSM_DOCUMENT: __SSM_DOCUMENT_NAME__
  WAIT_TIME: __WAIT_FOR_INSTANCES__

permissions:
  id-token: write
  contents: read

jobs:
  # Health check job - verifies instances are ready
  health-check:
    name: Health Check Instances
    runs-on: ubuntu-latest
    # Run if: manual dispatch with health-check/both, OR automatic trigger
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'health-check' || github.event.inputs.action == 'both')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.REGION }}

      - name: Wait for instances to be ready
        run: |
          echo "Waiting ${{ env.WAIT_TIME }} seconds for instances to initialize..."
          sleep ${{ env.WAIT_TIME }}

      - name: Get instance IDs
        id: instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.INSTANCE_TAG_PATTERN }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)
          
          if [ -z "$INSTANCE_IDS" ]; then
            echo "ERROR: No running instances found matching pattern: ${{ env.INSTANCE_TAG_PATTERN }}"
            exit 1
          fi
          
          echo "Found instances: $INSTANCE_IDS"
          echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_OUTPUT
          
          # Get instance details
          aws ec2 describe-instances \
            --instance-ids $INSTANCE_IDS \
            --query 'Reservations[*].Instances[*].[InstanceId,Tags[?Key==`Name`].Value|[0],State.Name,PrivateIpAddress]' \
            --output table

      - name: Check SSM connectivity
        run: |
          INSTANCE_IDS="${{ steps.instances.outputs.instance_ids }}"
          
          echo "Checking SSM agent connectivity..."
          for instance_id in $INSTANCE_IDS; do
            SSM_STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$instance_id" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text)
            
            if [ "$SSM_STATUS" != "Online" ]; then
              echo "WARNING: Instance $instance_id SSM status: $SSM_STATUS"
              echo "Ensure the instance has IAM role with AmazonSSMManagedInstanceCore policy"
            else
              echo "✓ Instance $instance_id is SSM connected"
            fi
          done

      - name: Run health check commands
        run: |
          INSTANCE_IDS="${{ steps.instances.outputs.instance_ids }}"
          
          echo "Running health checks on instances..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "${{ env.SSM_DOCUMENT }}" \
            --parameters 'commands=["__HEALTH_CHECK_COMMANDS__"]' \
            --comment "Health check from GitHub Actions" \
            --query "Command.CommandId" \
            --output text)
          
          echo "Command ID: $COMMAND_ID"
          
          # Wait for command to complete
          echo "Waiting for command to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id $(echo $INSTANCE_IDS | awk '{print $1}') \
            --max-attempts 30 \
            --delay 10 || true
          
          # Get results for each instance
          for instance_id in $INSTANCE_IDS; do
            echo ""
            echo "=== Results for $instance_id ==="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$instance_id" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

  # Configure job - runs configuration/deployment commands
  configure:
    name: Configure Instances
    runs-on: ubuntu-latest
    needs: health-check
    # Run if: manual dispatch with configure/both
    if: |
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.action == 'configure' || github.event.inputs.action == 'both')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.REGION }}

      - name: Get instance IDs
        id: instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.INSTANCE_TAG_PATTERN }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)
          
          if [ -z "$INSTANCE_IDS" ]; then
            echo "ERROR: No running instances found"
            exit 1
          fi
          
          echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_OUTPUT

      - name: Run configuration commands
        run: |
          INSTANCE_IDS="${{ steps.instances.outputs.instance_ids }}"
          
          echo "Running configuration on instances..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "${{ env.SSM_DOCUMENT }}" \
            --parameters 'commands=["__CONFIG_COMMANDS__"]' \
            --comment "Configuration from GitHub Actions" \
            --query "Command.CommandId" \
            --output text)
          
          echo "Command ID: $COMMAND_ID"
          
          # Wait for command to complete
          echo "Waiting for command to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id $(echo $INSTANCE_IDS | awk '{print $1}') \
            --max-attempts 30 \
            --delay 10 || true
          
          # Get results for each instance
          for instance_id in $INSTANCE_IDS; do
            echo ""
            echo "=== Configuration results for $instance_id ==="
            OUTPUT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$instance_id" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text)
            
            echo "$OUTPUT"
            
            # Check if command failed
            STATUS=$(echo "$OUTPUT" | awk '{print $1}')
            if [ "$STATUS" != "Success" ]; then
              echo "ERROR: Configuration failed for $instance_id"
              exit 1
            fi
          done
          
          echo "✓ Configuration completed successfully on all instances"
